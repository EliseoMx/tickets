<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - INCAP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f5f7;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 30px;
        }

        .reloj {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.85;
            font-variant-numeric: tabular-nums;
        }

        .version-sistema {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .contenedor {
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .boton {
            display: inline-block;
            background-color: #2980b9;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .error {
            color: #c0392b;
            margin-top: 15px;
        }

        .mensaje {
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            margin-bottom: 15px;
            transition: opacity 0.6s ease;
        }

        .mensaje.success {
            background-color: #d4edda;
            color: #155724;
        }

        .mensaje.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <header>
        <h1>Atención al Cliente INCAP</h1>
        <div class="reloj" id="reloj"></div>
        <div class="version-sistema">{{ version_sistema }}</div>
    </header>
    <div class="contenedor">
        <h2>Iniciar sesión</h2>
        {% if messages %}
        {% for message in messages %}
        <div class="mensaje {{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% if form.errors %}
        <p class="error">Usuario, email o contraseña incorrectos.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Usuario o email</label>
            <input type="text" name="username" id="id_username">

            <label for="id_password">Contraseña</label>
            <input type="password" name="password" id="id_password">

            <button type="submit" class="boton">Entrar</button>
        </form>
    </div>

    <script>
        (function () {
            var zonaHoraria = Intl.DateTimeFormat().resolvedOptions().timeZone;
            var coincidencia = document.cookie.match(/(?:^|; )django_timezone=([^;]*)/);
            var zonaGuardada = coincidencia ? decodeURIComponent(coincidencia[1]) : null;

            if (zonaHoraria && zonaHoraria !== zonaGuardada) {
                document.cookie = 'django_timezone=' + encodeURIComponent(zonaHoraria) + ';path=/;max-age=31536000';
                location.reload();
                return;
            }

            function actualizarReloj() {
                var el = document.getElementById('reloj');
                if (!el) return;
                var ahora = new Date();
                var horas = String(ahora.getHours()).padStart(2, '0');
                var minutos = String(ahora.getMinutes()).padStart(2, '0');
                var segundos = String(ahora.getSeconds()).padStart(2, '0');
                el.textContent = horas + ':' + minutos + ':' + segundos + ' (' + zonaHoraria + ')';
            }
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
        })();
    </script>
    <script>
        document.querySelectorAll('.mensaje').forEach(function (el) {
            setTimeout(function () {
                el.style.opacity = '0';
                setTimeout(function () { el.style.display = 'none'; }, 600);
            }, 3000);
        });
    </script>
</body>

</html>

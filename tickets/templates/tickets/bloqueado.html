<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso bloqueado - INCAP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f5f7;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 30px;
        }

        .contenedor {
            max-width: 480px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .icono {
            font-size: 40px;
        }

        h2 {
            color: #c0392b;
        }

        p {
            color: #555;
        }

        .volver {
            display: inline-block;
            margin-top: 15px;
            color: #2980b9;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header>
        <h1>{{ nombre_sistema }}</h1>
    </header>
    <div class="contenedor">
        <div class="icono">🔒</div>
        <h2>Acceso bloqueado temporalmente</h2>
        <p>
            Hubo demasiados intentos fallidos de inicio de sesión para "{{ username }}".
            Por seguridad, este acceso quedó bloqueado
            {% if cooloff_timedelta %}durante un rato{% endif %}.
            Intenta de nuevo más tarde.
        </p>
        <a href="{% url 'login' %}" class="volver">← Volver al inicio de sesión</a>
    </div>
</body>

</html>
